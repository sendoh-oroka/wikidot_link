<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; frame-ancestors 'none';">
  <title>SCP-JP ガイドページ リンク可視化</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"
          integrity="sha384-CjloA8y00+1SDAUkjs099PVfnY2KmDC2BZnws9kh8D/lX1s46w6EPhpXdqMfjK6i"
          crossorigin="anonymous"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    #controls { display: flex; align-items: center; gap: 16px; padding: 8px 16px; background: #16213e; border-bottom: 1px solid #0f3460; flex-shrink: 0; flex-wrap: wrap; }
    #controls label { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #a0b4cc; white-space: nowrap; }
    #controls input[type="number"], #controls input[type="text"] { background: #0f3460; border: 1px solid #1e5080; border-radius: 4px; color: #e0e0e0; padding: 4px 8px; font-size: 13px; outline: none; }
    #controls input:focus { border-color: #4a9eff; }
    #controls .search-field { width: 180px; }
    .control-group { display: flex; align-items: center; gap: 8px; }
    .separator { width: 1px; height: 24px; background: #1e4060; }
    .toggle-btn { background: #0f3460; border: 1px solid #1e5080; border-radius: 4px; color: #a0b4cc; padding: 4px 10px; font-size: 13px; cursor: pointer; white-space: nowrap; transition: background 0.15s, color 0.15s, border-color 0.15s; }
    .toggle-btn:hover { background: #1e5080; color: #e0e0e0; }
    .toggle-btn.active { background: #1a4030; border-color: #4caf50; color: #4caf50; }
    #main { display: flex; flex: 1; overflow: hidden; }
    #graph-container { flex: 1; position: relative; overflow: hidden; }
    #graph-container svg { width: 100%; height: 100%; cursor: grab; }
    #graph-container svg:active { cursor: grabbing; }
    #legend { position: absolute; bottom: 16px; left: 16px; background: rgba(22, 33, 62, 0.92); border: 1px solid #0f3460; border-radius: 6px; padding: 10px 14px; font-size: 12px; color: #a0b4cc; pointer-events: none; z-index: 10; }
    #legend .legend-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #7090a0; margin-bottom: 7px; }
    #legend .legend-item { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; line-height: 1; }
    #legend .legend-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    #legend .legend-line { width: 20px; height: 3px; flex-shrink: 0; border-radius: 1px; }
    #legend .legend-note { margin-top: 7px; border-top: 1px solid #0f3460; padding-top: 7px; color: #7090a0; font-size: 10px; line-height: 1.5; }
    #panel { width: 280px; flex-shrink: 0; background: #16213e; border-left: 1px solid #0f3460; overflow-y: auto; padding: 12px; }
    #panel::-webkit-scrollbar { width: 6px; }
    #panel::-webkit-scrollbar-track { background: #0f3460; }
    #panel::-webkit-scrollbar-thumb { background: #1e5080; border-radius: 3px; }
    #panel-content { font-size: 13px; color: #c0c8d0; }
    #panel-placeholder { color: #4a6080; font-size: 13px; text-align: center; margin-top: 40px; }
    .panel-title { font-size: 15px; font-weight: bold; color: #e0e8f0; margin-bottom: 10px; line-height: 1.4; }
    .panel-row { margin-bottom: 8px; line-height: 1.5; }
    .panel-label { color: #7090a0; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
    .panel-row a { color: #4a9eff; text-decoration: none; }
    .panel-row a:hover { text-decoration: underline; }
    .panel-section-header { font-size: 12px; font-weight: bold; color: #a0b4cc; margin: 14px 0 6px; border-bottom: 1px solid #0f3460; padding-bottom: 4px; }
    .panel-link-item { padding: 3px 0; cursor: pointer; color: #8ab4cc; font-size: 12px; display: block; line-height: 1.4; }
    .panel-link-item:hover { color: #4a9eff; }
    .multi-node-block { border: 1px solid #0f3460; border-radius: 4px; padding: 8px; margin-bottom: 10px; }
    .multi-count { font-size: 12px; color: #7090a0; margin-bottom: 8px; }
    .copy-btn { display: block; width: 100%; margin-top: 14px; padding: 7px 12px; background: #0f3460; border: 1px solid #1e5080; border-radius: 4px; color: #a0b4cc; font-size: 12px; cursor: pointer; text-align: center; transition: background 0.15s, color 0.15s; }
    .copy-btn:hover { background: #1e5080; color: #e0e0e0; }
    .copy-btn.copied { background: #1a4030; border-color: #4caf50; color: #4caf50; }
    .node circle { stroke-width: 1.5px; cursor: pointer; transition: opacity 0.2s; }
    .node text { pointer-events: none; user-select: none; }
    .link { transition: opacity 0.2s; }
  </style>
</head>
<body>

<div id="controls">
  <div class="control-group">
    <label><input type="text" id="searchTitle" class="search-field" placeholder="タイトル・URLで検索..."></label>
    <label><input type="text" id="searchAuthor" class="search-field" placeholder="著者で検索..."></label>
  </div>
  <div class="separator"></div>
  <div class="control-group">
    <label><span>X年以前を強調:</span><input type="number" id="yearFilter" placeholder="例: 2021" min="2013" max="2030" style="width:80px"></label>
    <label><span>密度:</span><input type="range" id="densitySlider" min="50" max="500" value="200" style="width:100px"></label>
    <button class="toggle-btn" id="mutualOnly">相互リンクのみ表示</button>
    <button class="toggle-btn" id="excludeFoundation">SCP財団以外を表示</button>
  </div>
</div>

<div id="main">
  <div id="graph-container">
    <svg id="svg"></svg>
    <div id="legend">
      <div class="legend-title">凡例</div>
      <div class="legend-item"><span class="legend-dot" style="background:#808080"></span>選択中</div>
      <div class="legend-item"><span class="legend-dot" style="background:#e05030"></span>相互リンク</div>
      <div class="legend-item"><span class="legend-dot" style="background:#4caf50"></span>リンク先</div>
      <div class="legend-item"><span class="legend-dot" style="background:#ff9800"></span>リンク元</div>
      <div class="legend-item"><span class="legend-dot" style="background:#4a9eff"></span>通常</div>
      <div class="legend-item" style="margin-top:6px"><span class="legend-line" style="background:#e05030"></span>相互リンク</div>
      <div class="legend-note">Shift+クリックで複数選択<br>ノード中心の数字:<br>−N 被リンク数　＋N リンク数</div>
    </div>
  </div>
  <div id="panel">
    <div id="panel-placeholder">ノードをクリックすると<br>詳細が表示されます</div>
    <div id="panel-content" style="display:none"></div>
  </div>
</div>

<script>
// ---- ユーティリティ関数 ----
const linkSrc = (l) => typeof l.source === 'object' ? l.source.id : l.source;
const linkTgt = (l) => typeof l.target === 'object' ? l.target.id : l.target;
const getPairKey = (a, b) => a < b ? `${a}|${b}` : `${b}|${a}`;
const escHtml = (str) => String(str).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[m]);
const isSafeUrl = (url) => /^https?:\/\//i.test(url);
const toLower = (str) => (str || '').toLowerCase();

// ---- 状態管理オブジェクト ----
const state = {
  selectedIds: new Set(),
  yearFilterVal: null,
  mutualOnly: false,
  excludeFoundation: false,
  searchTitle: '',
  searchAuthor: ''
};

// カラーパレット
const COLORS = {
  selected: '#808080', mutual: '#e05030', target: '#4caf50', source: '#ff9800', 
  normal: '#4a9eff', bgStroke: '#1a3060', highlightText: '#ffd700', dim: '#555', dimText: '#8aa8cc'
};

fetch('./data.json').then(r => r.json()).then(data => {
  // D3が元データを書き換えるのを防ぐためディープコピー
  const allNodes = data.nodes.map(d => ({ ...d }));
  const allLinks = data.links.map(d => ({ ...d }));
  const allNodeMap = Object.fromEntries(allNodes.map(n => [n.id, n]));

  // 相互リンクと次数の事前計算
  const mutualPairs = new Set();
  const mutualNodeIds = new Set();
  const inDegreeMap = Object.fromEntries(allNodes.map(n => [n.id, 0]));

  allLinks.forEach(l => {
    const s = linkSrc(l), t = linkTgt(l);
    inDegreeMap[t]++;
    if (allLinks.some(ll => linkSrc(ll) === t && linkTgt(ll) === s)) {
      mutualPairs.add(getPairKey(s, t));
      mutualNodeIds.add(s).add(t);
    }
  });

  const isMutual = (a, b) => mutualPairs.has(getPairKey(a, b));
  const nodeRadius = d3.scaleSqrt().domain([0, Math.max(1, ...Object.values(inDegreeMap))]).range([5, 22]);

  // ---- SVGセットアップ ----
  const container = document.getElementById('graph-container');
  const svg = d3.select('#svg');
  const defs = svg.append('defs');

  const createMarker = (id, color, reverse = false) => {
    defs.append('marker')
      .attr('id', id).attr('viewBox', '0 -4 8 8')
      .attr('refX', reverse ? 0 : 8).attr('refY', 0)
      .attr('markerWidth', 6).attr('markerHeight', 6)
      .attr('orient', 'auto')
      .append('path').attr('d', reverse ? 'M8,-4L0,0L8,4' : 'M0,-4L8,0L0,4').attr('fill', color);
  };

  createMarker('arrow-default', COLORS.dim);
  createMarker('arrow-default-rev', COLORS.dim, true);
  createMarker('arrow-source', COLORS.source);
  createMarker('arrow-target', COLORS.target);
  createMarker('arrow-mutual', COLORS.mutual);
  createMarker('arrow-mutual-rev', COLORS.mutual, true);

  const gRoot = svg.append('g').attr('class', 'root');
  const zoom = d3.zoom().scaleExtent([0.1, 8]).on('zoom', e => gRoot.attr('transform', e.transform));
  svg.call(zoom).on('click', e => {
    if (e.target.tagName === 'svg') {
      state.selectedIds.clear();
      applyAllFilters();
      updatePanel();
    }
  });

  const gLinks = gRoot.append('g').attr('class', 'links');
  const gNodes = gRoot.append('g').attr('class', 'nodes');
  
  let simulation, nodeSelection, linkSelection;

  // ---- グラフ構築 ----
  function buildGraph() {
    const seenMutual = new Set();
    const dedupedLinks = allLinks.map(l => {
      const s = linkSrc(l), t = linkTgt(l), isMut = isMutual(s, t);
      if (isMut) {
        const key = getPairKey(s, t);
        if (seenMutual.has(key)) return null;
        seenMutual.add(key);
        // 【修正点】 Math.min/max は文字列だとNaNになるため、比較演算子を使用
        return { source: s < t ? s : t, target: s < t ? t : s, count: l.count, mutual: true };
      }
      return { source: s, target: t, count: l.count, mutual: false };
    }).filter(Boolean);

    // シミュレーションには常に専用のコピーを渡す
    const simNodes = allNodes.map(d => ({ ...d }));

    if (simulation) simulation.stop();
    simulation = d3.forceSimulation(simNodes)
      .force('link', d3.forceLink(dedupedLinks).id(d => d.id).distance(d => d.mutual ? 40 : 120))
      .force('charge', d3.forceManyBody().strength(-parseInt(document.getElementById('densitySlider').value)))
      .force('center', d3.forceCenter(container.clientWidth / 2, container.clientHeight / 2))
      .force('collision', d3.forceCollide().radius(d => nodeRadius(inDegreeMap[d.id] || 0) + 5));

    linkSelection = gLinks.selectAll('line').data(dedupedLinks).join('line')
      .attr('class', 'link').attr('stroke-width', 1.5)
      .attr('marker-end', 'url(#arrow-default)')
      .attr('marker-start', d => d.mutual ? 'url(#arrow-default-rev)' : '');

    nodeSelection = gNodes.selectAll('g.node').data(simNodes, d => d.id).join('g')
      .attr('class', 'node')
      .call(d3.drag()
        .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
        .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
        .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }))
      .on('click', (e, d) => {
        e.stopPropagation();
        if (e.shiftKey) state.selectedIds.has(d.id) ? state.selectedIds.delete(d.id) : state.selectedIds.add(d.id);
        else state.selectedIds = new Set([d.id]);
        applyAllFilters();
        updatePanel();
      });

    nodeSelection.selectAll('*').remove(); // 再描画時の重複を防ぐ
    nodeSelection.append('circle').attr('r', d => nodeRadius(inDegreeMap[d.id] || 0));
    nodeSelection.append('text').attr('class', 'center-count').attr('text-anchor', 'middle').attr('dominant-baseline', 'central').attr('font-size', '8px').attr('fill', 'white').attr('font-weight', 'bold');
    nodeSelection.append('text').attr('class', 'node-label').text(d => d.title).attr('x', d => nodeRadius(inDegreeMap[d.id] || 0) + 3).attr('y', 3).attr('font-size', '9px');

    simulation.on('tick', () => {
      linkSelection.each(function(d) {
        const sr = nodeRadius(inDegreeMap[d.source.id] || 0) + 6;
        const tr = nodeRadius(inDegreeMap[d.target.id] || 0) + 6;
        const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        const ux = dx / dist, uy = dy / dist;
        d3.select(this)
          .attr('x1', d.source.x + (d.mutual ? ux * sr : 0))
          .attr('y1', d.source.y + (d.mutual ? uy * sr : 0))
          .attr('x2', d.target.x - ux * tr)
          .attr('y2', d.target.y - uy * tr);
      });
      nodeSelection.attr('transform', d => `translate(${d.x},${d.y})`);
    });

    applyAllFilters();
  }

  // ---- フィルタ・ハイライト制御 ----
  function applyAllFilters() {
    if (!nodeSelection) return;
    
    const hasSel = state.selectedIds.size > 0;
    const { yearFilterVal, searchTitle, searchAuthor, excludeFoundation, mutualOnly } = state;
    
    const rel = { targets: new Set(), sources: new Set(), mutuals: new Set(), counts: {} };
    if (hasSel) {
      allLinks.forEach(l => {
        const sid = linkSrc(l), tid = linkTgt(l);
        const selS = state.selectedIds.has(sid), selT = state.selectedIds.has(tid);
        if (selS && !selT) {
          isMutual(sid, tid) ? rel.mutuals.add(tid) : rel.targets.add(tid);
          rel.counts[tid] = rel.counts[tid] || { in: 0, out: 0 };
          rel.counts[tid].out += l.count;
        }
        if (selT && !selS) {
          isMutual(sid, tid) ? rel.mutuals.add(sid) : rel.sources.add(sid);
          rel.counts[sid] = rel.counts[sid] || { in: 0, out: 0 };
          rel.counts[sid].in += l.count;
        }
      });
    }

    const nodeVisible = new Map();

    nodeSelection.each(function(d) {
      const isSel = state.selectedIds.has(d.id);
      const isMut = rel.mutuals.has(d.id);
      const isTgt = !mutualOnly && rel.targets.has(d.id);
      const isSrc = !mutualOnly && rel.sources.has(d.id);
      
      const passStrict = (!yearFilterVal || d.year <= yearFilterVal) && 
                         (!excludeFoundation || d.author !== 'SCP財団') && 
                         (!mutualOnly || mutualNodeIds.has(d.id));
                         
      const matchSearch = (!searchTitle || toLower(d.id).includes(toLower(searchTitle)) || toLower(d.title).includes(toLower(searchTitle))) &&
                          (!searchAuthor || toLower((d.author || '').replace(/[{}]/g, '')).includes(toLower(searchAuthor)));

      const visible = hasSel ? ((isSel || isMut || isTgt || isSrc) && passStrict) : (passStrict && matchSearch);
      nodeVisible.set(d.id, visible);

      const fillColor = isSel ? COLORS.selected : isMut ? COLORS.mutual : isTgt ? COLORS.target : isSrc ? COLORS.source : COLORS.normal;
      
      const node = d3.select(this);
      node.select('circle').attr('fill', fillColor).attr('stroke', isSel ? '#606060' : COLORS.bgStroke).attr('opacity', visible ? 1 : 0.08);
      
      const c = rel.counts[d.id];
      node.select('text.center-count').text(hasSel && c ? [c.in > 0 ? `\u2212${c.in}` : '', c.out > 0 ? `\uff0b${c.out}` : ''].filter(Boolean).join(' ') : '');
      node.select('text.node-label').attr('display', visible ? null : 'none').attr('fill', isSel ? 'white' : (searchTitle || searchAuthor) && matchSearch ? COLORS.highlightText : COLORS.dimText).attr('font-weight', isSel ? 'bold' : 'normal');
    });

    const getLinkStyle = (l, sid, tid) => {
      if (!nodeVisible.get(sid) || !nodeVisible.get(tid)) return { c: COLORS.dim, o: 0.05, mE: 'url(#arrow-default)', mS: '' };
      
      if (hasSel) {
        const selS = state.selectedIds.has(sid), selT = state.selectedIds.has(tid);
        if (mutualOnly && !l.mutual) return { c: COLORS.dim, o: 0.08, mE: 'url(#arrow-default)', mS: '' };
        if (selS && selT) return l.mutual ? { c: COLORS.mutual, o: 1, mE: 'url(#arrow-mutual)', mS: 'url(#arrow-mutual-rev)' } : { c: COLORS.dim, o: 0.8, mE: 'url(#arrow-default)', mS: '' };
        if (l.mutual && (selS || selT)) return { c: COLORS.mutual, o: 1, mE: 'url(#arrow-mutual)', mS: 'url(#arrow-mutual-rev)' };
        if (selS && rel.targets.has(tid)) return { c: COLORS.target, o: 1, mE: 'url(#arrow-target)', mS: '' };
        if (selT && rel.sources.has(sid)) return { c: COLORS.source, o: 1, mE: 'url(#arrow-source)', mS: '' };
        return { c: COLORS.dim, o: 0.05, mE: 'url(#arrow-default)', mS: '' };
      }
      
      if (mutualOnly) return l.mutual ? { c: COLORS.dim, o: 0.8, mE: 'url(#arrow-default)', mS: 'url(#arrow-default-rev)' } : { c: COLORS.dim, o: 0.08, mE: 'url(#arrow-default)', mS: '' };
      return { c: COLORS.dim, o: 0.8, mE: 'url(#arrow-default)', mS: l.mutual ? 'url(#arrow-default-rev)' : '' };
    };

    linkSelection.each(function(l) {
      const style = getLinkStyle(l, linkSrc(l), linkTgt(l));
      d3.select(this).attr('stroke', style.c).attr('opacity', style.o).attr('marker-end', style.mE).attr('marker-start', style.mS);
    });
  }

  // ---- パネル操作 ----
  function getNodeLinks(nodeId) {
    const res = { mutuals: [], targets: [], sources: [] };
    const seenMutuals = new Set();
    allLinks.forEach(l => {
      const sid = linkSrc(l), tid = linkTgt(l);
      if (sid === nodeId && allNodeMap[tid]) {
        if (isMutual(sid, tid)) { if (!seenMutuals.has(tid)) { seenMutuals.add(tid); res.mutuals.push({ node: allNodeMap[tid], count: l.count }); } }
        else res.targets.push({ node: allNodeMap[tid], count: l.count });
      }
      if (tid === nodeId && allNodeMap[sid] && !isMutual(sid, tid)) res.sources.push({ node: allNodeMap[sid], count: l.count });
    });
    return res;
  }

  const buildAuthorHtml = (author) => {
    if (!author) return '';
    const formatName = (name) => name === 'SCP財団' ? escHtml(name) : `<a href="https://www.wikidot.com/user:info/${encodeURIComponent(name.replace(/\s+/g, '-'))}" target="_blank">${escHtml(name)}</a>`;
    return author.startsWith('{') ? author.slice(1, -1).split(',').map(n => formatName(n.trim())).join(', ') : formatName(author);
  };

  const renderPanelSection = (title, items) => {
    let html = `<div class="panel-section-header">${title} (${items.length}件)</div>`;
    return html + (items.length ? items.map(i => `<span class="panel-link-item" data-node-id="${escHtml(i.node.id)}">${escHtml(i.node.title)}</span>`).join('') : `<div style="color:#4a6080;font-size:12px">なし</div>`);
  };

  function updatePanel() {
    const placeholder = document.getElementById('panel-placeholder'), content = document.getElementById('panel-content');
    if (!state.selectedIds.size) { placeholder.style.display = 'block'; content.style.display = 'none'; return; }
    
    placeholder.style.display = 'none'; content.style.display = 'block';
    const selectedArr = [...state.selectedIds].map(id => allNodeMap[id]).filter(Boolean);
    
    let html = selectedArr.length > 1 ? `<div class="multi-count">${selectedArr.length}件選択中</div>` : '';
    
    selectedArr.forEach(node => {
      const { mutuals, targets, sources } = getNodeLinks(node.id);
      html += `
        <div class="${selectedArr.length > 1 ? 'multi-node-block' : ''}">
          <div class="panel-title">${escHtml(node.title)}</div>
          <div class="panel-row"><div class="panel-label">URL</div>${isSafeUrl(node.url) ? `<a href="${escHtml(node.url)}" target="_blank">${escHtml(node.url)}</a>` : escHtml(node.url)}</div>
          <div class="panel-row"><div class="panel-label">著者</div>${buildAuthorHtml(node.author)}</div>
          <div class="panel-row"><div class="panel-label">作成年</div>${node.year}</div>
          ${renderPanelSection('相互リンク', mutuals)}
          ${renderPanelSection('被リンク元', sources)}
          ${renderPanelSection('リンク先', targets)}
        </div>`;
    });
    
    content.innerHTML = html + `<button class="copy-btn" id="copy-btn">詳細情報をコピー</button>`;

    content.querySelectorAll('.panel-link-item').forEach(el => el.addEventListener('click', () => {
      const nid = el.dataset.nodeId;
      state.selectedIds = new Set([nid]);
      applyAllFilters();
      updatePanel();
      
      const d = nodeSelection.data().find(n => n.id === nid);
      if (d && d.x !== undefined) {
        const t = d3.zoomTransform(svg.node());
        svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity.translate(container.clientWidth / 2 - t.k * d.x, container.clientHeight / 2 - t.k * d.y).scale(t.k));
      }
    }));

    document.getElementById('copy-btn')?.addEventListener('click', function() {
      const text = selectedArr.map(node => {
        const { mutuals, targets, sources } = getNodeLinks(node.id);
        const mapCounts = (arr) => arr.reduce((acc, curr) => ({...acc, [curr.node.id]: (acc[curr.node.id]||0) + curr.count}), {});
        const tMap = mapCounts(targets), sMap = mapCounts(sources);
        
        let t = `## ${node.title}\n* ${node.author && node.author !== 'SCP財団' && !node.author.startsWith('{') ? `[${node.author}](https://www.wikidot.com/user:info/${encodeURIComponent(node.author.replace(/\s+/g, '-'))})` : (node.author || '(不明)')}\n* ${node.url}\n`;
        if (mutuals.length) t += `### 相互リンク\n` + mutuals.map(m => `* ${m.node.url}\n`).join('');
        if (sources.length) t += `### 被リンク\n` + Object.keys(sMap).map(id => `* ${allNodeMap[id].url} (\u2190${sMap[id]})\n`).join('');
        if (targets.length) t += `### リンク\n` + Object.keys(tMap).map(id => `* ${allNodeMap[id].url} (\u2192${tMap[id]})\n`).join('');
        return t.trimEnd();
      }).join('\n\n---\n\n');

      const btn = this;
      const onCopied = () => { btn.textContent = 'コピーしました！'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = 'Discord形式でコピー'; btn.classList.remove('copied'); }, 2000); };
      
      if (navigator.clipboard) navigator.clipboard.writeText(text).then(onCopied).catch(onCopied);
      else { const ta = document.createElement('textarea'); ta.value = text; ta.style.cssText = 'position:fixed;opacity:0'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); onCopied(); }
    });
  }

  // ---- イベント登録の共通化 ----
  const bindInput = (id, key, parser = v => v) => document.getElementById(id).addEventListener('input', e => { state[key] = parser(e.target.value); applyAllFilters(); });
  const bindToggle = (id, key) => document.getElementById(id).addEventListener('click', function() { state[key] = !state[key]; this.classList.toggle('active', state[key]); applyAllFilters(); });

  bindInput('yearFilter', 'yearFilterVal', v => isNaN(parseInt(v, 10)) ? null : parseInt(v, 10));
  bindInput('searchTitle', 'searchTitle', v => v.trim());
  bindInput('searchAuthor', 'searchAuthor', v => v.trim());
  bindToggle('mutualOnly', 'mutualOnly');
  bindToggle('excludeFoundation', 'excludeFoundation');

  document.getElementById('densitySlider').addEventListener('input', function() {
    if (simulation) simulation.force('charge', d3.forceManyBody().strength(-parseInt(this.value))).alpha(0.5).restart();
  });

  window.addEventListener('resize', () => {
    if (simulation) simulation.force('center', d3.forceCenter(container.clientWidth / 2, container.clientHeight / 2)).alpha(0.1).restart();
  });

  buildGraph();
});
</script>
</body>
